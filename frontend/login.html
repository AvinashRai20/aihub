<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sign In | AI Hub Pro</title>
    <link rel="stylesheet" href="css/style.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        .auth-container {
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 2rem;
        }
        .auth-card {
            background: var(--bg-card);
            padding: 3rem;
            border-radius: 32px;
            border: 1px solid var(--border);
            width: 100%;
            max-width: 450px;
            box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.5);
            animation: fadeInUp 0.6s ease;
        }
        .form-group {
            margin-bottom: 1.5rem;
        }
        .form-group label {
            display: block;
            margin-bottom: 0.5rem;
            color: var(--text-muted);
            font-size: 0.9rem;
        }
        .form-group input {
            width: 100%;
            padding: 1rem;
            background: var(--bg-dark);
            border: 1px solid var(--border);
            border-radius: 12px;
            color: white;
            outline: none;
            transition: var(--transition);
        }
        .form-group input:focus {
            border-color: var(--primary);
        }
        .auth-card h2 {
            font-size: 2rem;
            margin-bottom: 0.5rem;
            text-align: center;
        }
        .auth-card p {
            text-align: center;
            color: var(--text-muted);
            margin-bottom: 2.5rem;
        }
    </style>
</head>
<body>
    <div class="bg-glow">
        <div class="glow-1"></div>
        <div class="glow-2"></div>
    </div>

    <div class="auth-container">
        <div class="auth-card">
            <h2>Welcome Back</h2>
            <p>Access your personalized AI toolkit</p>
            
            <form id="loginForm">
                <div class="form-group">
                    <label>Username (or Email)</label>
                    <input type="text" id="username" placeholder="name@company.com" required>
                </div>
                <div class="form-group">
                    <label>Password</label>
                    <input type="password" id="password" placeholder="••••••••" required>
                </div>
                <button type="submit" class="btn btn-primary" style="width: 100%; padding: 1rem; margin-top: 1rem;">Sign In</button>
            </form>

            <script>
                document.getElementById('loginForm').addEventListener('submit', async (e) => {
                    e.preventDefault();
                    const username = document.getElementById('username').value;
                    const password = document.getElementById('password').value;

                    try {
                        const res = await fetch('/api/login', {
                            method: 'POST',
                            headers: { 'Content-Type': 'application/json' },
                            body: JSON.stringify({ username, password })
                        });
                        const data = await res.json();
                        if (res.ok) {
                            alert(data.message);
                            window.location.href = data.redirect;
                        } else {
                            alert(data.error || 'Invalid credentials');
                        }
                    } catch (err) {
                        alert('Error connecting to server.');
                    }
                });
            </script>
            
            <div style="margin-top: 2rem; text-align: center; color: var(--text-muted);">
                Don't have an account? <a href="/register" style="color: var(--primary); text-decoration: none;">Create one</a>
            </div>
            <div style="margin-top: 1rem; text-align: center;">
                <a href="/" style="color: var(--text-muted); text-decoration: none; font-size: 0.9rem;"><i class="fas fa-arrow-left"></i> Back to Home</a>
            </div>
        </div>
    </div>
</body>
</html>
